name: Crear IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Crear proyecto iOS
        run: |
          mkdir -p MyApp/MyApp

          cat > MyApp/project.yml << 'EOF'
          name: MyApp
          targets:
            MyApp:
              type: application
              platform: iOS
              sources:
                - MyApp
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.myapp.ios
                  INFOPLIST_FILE: MyApp/Info.plist
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
          EOF

          cat > MyApp/MyApp/AppDelegate.swift << 'EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
              ) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIViewController()
                  vc.view.backgroundColor = .systemBlue
                  let label = UILabel()
                  label.text = "Hola desde iPhone"
                  label.textColor = .white
                  label.textAlignment = .center
                  label.font = .boldSystemFont(ofSize: 24)
                  label.frame = CGRect(x: 20, y: 200, width: 350, height: 50)
                  vc.view.addSubview(label)
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

          cat > MyApp/MyApp/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MyApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generar proyecto Xcode
        run: cd MyApp && xcodegen generate

      - name: Compilar archive
        run: |
          xcodebuild \
            -project MyApp/MyApp.xcodeproj \
            -scheme MyApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/MyApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Crear IPA
        run: |
          APP=$(find $RUNNER_TEMP/MyApp.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MyApp.ipa Payload
          rm -rf Payload
          mv MyApp.ipa $RUNNER_TEMP/

      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyApp.ipa
          path: ${{ runner.temp }}/MyApp.ipa
