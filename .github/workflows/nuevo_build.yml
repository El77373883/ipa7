name: Nuevo Build IPA

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar XcodeGen
        run: brew install xcodegen
      
      - name: Crear proyecto iOS
        run: |
          mkdir -p app/app
          
          echo 'name: App
          targets:
            App:
              type: application
              platform: iOS
              sources: [app]
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.test.app
                CODE_SIGN_IDENTITY: ""
                CODE_SIGNING_REQUIRED: NO' > app/project.yml
          
          echo 'import UIKit
          @main class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              window = UIWindow(frame: UIScreen.main.bounds)
              window!.rootViewController = UIViewController()
              window!.makeKeyAndVisible()
              return true
            }
          }' > app/app/AppDelegate.swift
          
          cd app && xcodegen generate
      
      - name: Compilar
        run: |
          xcodebuild -project app/App.xcodeproj -scheme App -sdk iphoneos -archivePath app.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO archive
      
      - name: Crear IPA
        run: |
          APP_PATH=$(find app.xcarchive/Products/Applications -name "*.app" | head -1)
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload
      
      - uses: actions/upload-artifact@v4
        with:
          name: App
          path: App.ipa
